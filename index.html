    const NEIGHBORHOODS = [
      { id: "groruddalen", name: "Groruddalen", lat: 59.9500, lng: 10.8500, pm25: 18.4, lifeYearsLost: 1.8, pop: 139000, children: 28000, elderly: 19000, hospVisits: 1240, healthCost: 510, description: "Heavy traffic corridor, industrial zones" },

      { id: "nordstrand", name: "Nordstrand", lat: 59.8650, lng: 10.7950, pm25: 7.1, lifeYearsLost: 0.3, pop: 52000, children: 9800, elderly: 8900, hospVisits: 160, healthCost: 53, description: "Suburban, coastal, cleaner air" },
      { id: "sthanshaugen", name: "St. Hanshaugen", lat: 59.9250, lng: 10.7380, pm25: 11.3, lifeYearsLost: 0.9, pop: 38000, children: 5100, elderly: 5400, hospVisits: 290, healthCost: 117, description: "Mixed residential, moderate traffic" },
      { id: "bjerke", name: "Bjerke", lat: 59.9420, lng: 10.8150, pm25: 14.6, lifeYearsLost: 1.2, pop: 34000, children: 7400, elderly: 4600, hospVisits: 360, healthCost: 148, description: "Near highways, wood burning in winter" },
      { id: "ullern", name: "Ullern", lat: 59.9280, lng: 10.6480, pm25: 6.8, lifeYearsLost: 0.2, pop: 35000, children: 6200, elderly: 7100, hospVisits: 110, healthCost: 42, description: "Green, affluent, sheltered" },
      { id: "sondrenordstrand", name: "Søndre Nordstrand", lat: 59.8400, lng: 10.8100, pm25: 12.4, lifeYearsLost: 1.0, pop: 39000, children: 9600, elderly: 4200, hospVisits: 340, healthCost: 138, description: "Mixed, near E6 highway" },
    ];

    const SCENARIOS = [
      {
        id: "diesel", name: "Ban diesel in city centre", reduction: 0.3, cost: "130M", timeline: "2 years",
        savedLives: 45, savedCost: "295M", tag: "most_efficient", tagLabel: "Most cost-efficient",
        summary: "Prohibiting diesel vehicles from the city centre ring road reduces PM2.5 concentrations by an estimated 30%, based on observed outcomes from comparable urban restrictions in London, Brussels and Stockholm.",
        mechanism: "Diesel combustion produces PM2.5 particles at 5–10× the rate of modern petrol and EV alternatives. Restricting access eliminates the dominant source of roadside particulate matter in dense urban corridors.",
        confidence: "High",
        confidenceNote: "Multiple comparable cities have implemented Low Emission Zones since 2010. Oslo's traffic mix, road density, and meteorological conditions are well-modelled by NILU.",
        populations: ["Children under 10 (developing lungs)", "Elderly with cardiovascular conditions", "Residents along Ringveien and Ring 2", "Outdoor workers"],
        cobenefits: ["−18% urban NO₂ levels", "−12 dB average road noise", "−9% CO₂ from transport sector"],
        risks: ["Traffic displacement to E6/E18 ring roads", "Enforcement cost estimated at 15M NOK/year", "Moderate political resistance from freight operators"],
        sources: [
          { label: "WHO Air Quality Guidelines 2021", ref: "WHO/HEP/ECH/AQH/2021.01" },
          { label: "FHI Report: Health Effects of Traffic Pollution in Oslo", ref: "FHI IS-3021, 2022" },
          { label: "NILU Technical Report: PM2.5 Source Apportionment Oslo", ref: "NILU TR 5/2023" },
          { label: "Transport for London: ULEZ Impact Assessment", ref: "TfL Report, 2023" },
        ],
      },
      {
        id: "green", name: "Full green transport zone", reduction: 0.5, cost: "370M", timeline: "3–5 years",
        savedLives: 110, savedCost: "680M", tag: "recommended", tagLabel: "Recommended",
        summary: "A zero-emission transport zone covering the inner city — all combustion vehicles replaced by electric, hydrogen, or human-powered alternatives — is modelled to halve PM2.5 in the affected area. Based on Copenhagen and Amsterdam transition studies.",
        mechanism: "Eliminating all combustion engines removes both direct PM2.5 emissions and secondary particle formation from NOₓ reactions. The 50% reduction accounts for residual tyre and brake wear particulates, which persist regardless of fuel type.",
        confidence: "High",
        confidenceNote: "Copenhagen's full cycling infrastructure transition (2010–2022) and Amsterdam's emission zone data provide strong empirical grounding. Oslo's urban density is comparable.",
        populations: ["All inner-city residents (est. 85,000)", "School-age children in 23 affected schools", "Hospital patients at Ullevål and Rikshospitalet", "Tourists and daily commuters"],
        cobenefits: ["−45% CO₂ from inner-city transport", "−22 dB ambient noise reduction", "Increased cycling uptake, −8% obesity-related hospitalisations", "Significant urban heat island reduction"],
        risks: ["3–5 year transition disruption to businesses", "Charging infrastructure investment not included in cost estimate", "Equity concerns: lower-income workers may face longer commutes"],
        sources: [
          { label: "Nordic Council: Zero-Emission Urban Zones", ref: "Nordic Council Report 2023:04" },
          { label: "Oslo Climate Budget 2024", ref: "Oslo Kommune, 2024" },
          { label: "TU Delft: Amsterdam LEZ Health Outcomes", ref: "TU Delft Report, 2022" },
          { label: "Lancet Countdown on Health and Climate Change", ref: "Lancet, Vol. 402, 2023" },
        ],
      },
      {
        id: "woodburn", name: "Phase out wood burning", reduction: 0.2, cost: "85M", timeline: "4 years",
        savedLives: 30, savedCost: "170M", tag: null, tagLabel: null,
        summary: "Wood burning accounts for approximately 40% of Oslo's PM2.5 during winter months. A phased ban with subsidised heat pump conversion would reduce annual average PM2.5 by 20%, with significantly higher impact in residential neighbourhoods.",
        mechanism: "Residential wood combustion releases fine particles, polycyclic aromatic hydrocarbons (PAH), and black carbon directly into breathing height. Unlike traffic, emissions occur during nighttime temperature inversions when dispersion is minimal.",
        confidence: "Medium",
        confidenceNote: "The health model is robust, but 20% reduction assumes 80% compliance. Actual uptake depends heavily on subsidy design and public communication. NILU's winter monitoring underpins the baseline.",
        populations: ["Residents within 200m of high wood-burning density areas", "Children in residential neighbourhoods", "Elderly with respiratory conditions", "Bjerke and Søndre Nordstrand disproportionately affected"],
        cobenefits: ["−35% winter-peak PM2.5 spikes", "Lower household fire risk", "−18% black carbon deposition in local ecosystems"],
        risks: ["Cultural attachment to wood stoves (strong public resistance anticipated)", "Lower-income households rely on wood as cheap heat source — subsidy design is critical", "4-year timeline assumes rapid permit and installer capacity"],
        sources: [
          { label: "NILU: Residential Wood Burning Oslo — Winter Monitoring", ref: "NILU OR 12/2023" },
          { label: "FHI: Exposure Assessment Wood Smoke PM2.5", ref: "FHI Report IS-3018, 2021" },
          { label: "Norwegian Environment Agency: Biomass Combustion Inventory", ref: "M-2245, 2023" },
          { label: "EEA: Residential Heating and Air Quality", ref: "EEA Report 18/2022" },
        ],
      },
      {
        id: "who", name: "Full WHO compliance plan", reduction: 0.7, cost: "850M", timeline: "8–10 years",
        savedLives: 185, savedCost: "1.2B", tag: "most_effective", tagLabel: "Most effective",
        summary: "Bringing Oslo fully into compliance with WHO 2021 PM2.5 guidelines (5 µg/m³ annual mean) requires a comprehensive multi-source strategy combining all other scenarios plus industrial emission controls and urban greening. This is the only scenario that eliminates the air quality health gap entirely.",
        mechanism: "The WHO 2021 guidelines represent the threshold below which no measurable chronic health effect from PM2.5 has been observed in large cohort studies. Reaching this standard requires simultaneously addressing traffic, biomass, industrial and secondary aerosol formation.",
        confidence: "Medium",
        confidenceNote: "The 70% reduction is achievable based on modelling, but depends on sustained policy implementation across three or more electoral cycles. Helsingborg (Sweden) achieved WHO compliance in 2021 after a 12-year programme.",
        populations: ["All 700,000+ Oslo residents benefit", "Greatest relative gain in Groruddalen, Alnabru, Grønland", "Unborn children — prenatal PM2.5 exposure linked to low birth weight", "People with genetic cardiovascular susceptibility"],
        cobenefits: ["Full alignment with EU Clean Air Directive 2035 targets", "−55% CO₂ from covered sectors", "Estimated 420 fewer premature deaths over 10 years", "Significant reduction in dementia incidence (emerging evidence)"],
        risks: ["Requires political continuity across 2–3 governments", "Industrial controls may face legal challenges", "Cost estimate excludes land-use change and urban forestry"],
        sources: [
          { label: "WHO Global Air Quality Guidelines 2021", ref: "WHO/HEP/ECH/AQH/2021.01" },
          { label: "Lancet: Global burden of disease attributable to PM2.5", ref: "Lancet, Vol. 396, 2020" },
          { label: "EEA: Air Quality in Europe 2023", ref: "EEA Report 07/2023" },
          { label: "Norwegian Climate Action Plan 2030", ref: "Meld. St. 13, 2021–22" },
        ],
      },
    ];

    const WHO = 5;

    function getLungDamage(pm25) { return Math.min(1, Math.max(0, (pm25 - WHO) / 18)); }

    function interp(lat, lng, key) {
      let tw = 0, tv = 0;
      for (const n of NEIGHBORHOODS) {
        const d = Math.max(0.0005, Math.hypot(lat - n.lat, lng - n.lng));
        const w = 1 / (d * d); tw += w; tv += w * n[key];
      }
      return tv / tw;
    }

    function getNearest(lat, lng) {
      let min = Infinity, best = null;
      for (const n of NEIGHBORHOODS) {
        const d = Math.hypot(lat - n.lat, lng - n.lng);
        if (d < min) { min = d; best = n; }
      }
      return min < 0.025 ? best : null;
    }

    function LungSVG({ damage, breathPhase }) {
      const scale = 1 + Math.sin(breathPhase) * 0.03;
      const filter = [
        `saturate(${Math.max(0, 1 - damage * 5)})`,
        `brightness(${1 - damage * 0.82})`,
        `contrast(${1 + damage * 0.6})`,
      ].join(" ");
      return (
        <img
          src="lung.png"
          style={{
            width: "100%",
            height: "100%",
            transform: `scale(${scale})`,
            filter,
            transition: "filter 0.15s",
          }}
        />
      );
    }

    // Mercator helpers
    function lat2y(lat) { return Math.log(Math.tan(Math.PI / 4 + (lat * Math.PI / 180) / 2)); }
    function y2lat(y) { return (2 * Math.atan(Math.exp(y)) - Math.PI / 2) * 180 / Math.PI; }

    function latLngToPixel(lat, lng, centerLat, centerLng, zoom, w, h) {
      const scale = (256 * Math.pow(2, zoom)) / (2 * Math.PI);
      const cx = scale * (centerLng * Math.PI / 180);
      const cy = scale * lat2y(centerLat);
      const px = scale * (lng * Math.PI / 180);
      const py = scale * lat2y(lat);
      return { x: w / 2 + (px - cx), y: h / 2 - (py - cy) };
    }

    function pixelToLatLng(sx, sy, centerLat, centerLng, zoom, w, h) {
      const scale = (256 * Math.pow(2, zoom)) / (2 * Math.PI);
      const cx = scale * (centerLng * Math.PI / 180);
      const cy = scale * lat2y(centerLat);
      const px = cx + (sx - w / 2);
      const py = cy - (sy - h / 2);
      const lng = (px / scale) * 180 / Math.PI;
      const lat = y2lat(py / scale);
      return { lat, lng };
    }

    function MapView({ mouseScreen, setMouseScreen, isOnMap, setIsOnMap, hovered, setHovered, damage, breathPhase, rf, center, setCenter, zoom, setZoom, containerRef, w, h }) {
      const dragging = useRef(false);
      const lastPos = useRef({ x: 0, y: 0 });
      const moved = useRef(false);
      const leafletMapRef = useRef(null);
      const tileContainerRef = useRef(null);

      useEffect(() => {
        if (!tileContainerRef.current || leafletMapRef.current) return;
        const map = L.map(tileContainerRef.current, {
          zoomControl: false,
          dragging: false,
          scrollWheelZoom: false,
          keyboard: false,
          doubleClickZoom: false,
          zoomSnap: 0,
        });
        // Add tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
          maxZoom: 19,
        }).addTo(map);
        map.setView([center.lat, center.lng], zoom);
        leafletMapRef.current = map;
        return () => { map.remove(); leafletMapRef.current = null; };
      }, []);

      useEffect(() => {
        if (!leafletMapRef.current) return;
        leafletMapRef.current.setView([center.lat, center.lng], zoom, { animate: false });
      }, [center.lat, center.lng, zoom]);

      useEffect(() => {
        if (!leafletMapRef.current) return;
        leafletMapRef.current.invalidateSize();
      }, [w, h]);

      const handleMove = useCallback((e) => {
        const rect = containerRef.current?.getBoundingClientRect();
        if (!rect) return;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const sx = cx - rect.left;
        const sy = cy - rect.top;

        if (dragging.current) {
          moved.current = true;
          const dx = cx - lastPos.current.x;
          const dy = cy - lastPos.current.y;
          lastPos.current = { x: cx, y: cy };
          const newCenter = pixelToLatLng(w / 2 - dx, h / 2 - dy, center.lat, center.lng, zoom, w, h);
          setCenter({ lat: newCenter.lat, lng: newCenter.lng });
          return;
        }

        setMouseScreen({ x: sx, y: sy });
        const ll = pixelToLatLng(sx, sy, center.lat, center.lng, zoom, w, h);
        setHovered(getNearest(ll.lat, ll.lng));
      }, [containerRef, center, zoom, w, h, setCenter, setMouseScreen, setHovered]);

      const handleWheel = useCallback((e) => {
        e.preventDefault();
        const rect = containerRef.current?.getBoundingClientRect();
        if (!rect) return;
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const pivot = pixelToLatLng(mx, my, center.lat, center.lng, zoom, w, h);
        const newZoom = Math.max(10, Math.min(16, zoom - e.deltaY * 0.002));
        const pivotNewPx = latLngToPixel(pivot.lat, pivot.lng, center.lat, center.lng, newZoom, w, h);
        const shiftX = pivotNewPx.x - mx;
        const shiftY = pivotNewPx.y - my;
        const newCenter = pixelToLatLng(w / 2 + shiftX, h / 2 + shiftY, center.lat, center.lng, newZoom, w, h);
        setCenter({ lat: newCenter.lat, lng: newCenter.lng });
        setZoom(newZoom);
      }, [center, zoom, w, h, containerRef, setCenter, setZoom]);

      const handleDown = useCallback((e) => {
        dragging.current = true;
        moved.current = false;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        lastPos.current = { x: cx, y: cy };
      }, []);

      const handleUp = useCallback(() => { dragging.current = false; }, []);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const handler = (e) => handleWheel(e);
        el.addEventListener("wheel", handler, { passive: false });
        return () => el.removeEventListener("wheel", handler);
      }, [handleWheel, containerRef]);

      return (
        <div
          ref={containerRef}
          onMouseMove={handleMove}
          onTouchMove={handleMove}
          onMouseEnter={() => setIsOnMap(true)}
          onMouseLeave={() => { setIsOnMap(false); dragging.current = false; }}
          onMouseDown={handleDown}
          onMouseUp={handleUp}
          onTouchStart={handleDown}
          onTouchEnd={handleUp}
          style={{ width: w, height: h, position: "relative", cursor: dragging.current ? "grabbing" : (isOnMap ? "none" : "default"), overflow: "hidden", background: "#e8e4d8" }}
        >
          {/* Map tiles */}
          <div ref={tileContainerRef} style={{ position: "absolute", top: 0, left: 0, width: w, height: h, zIndex: 0, pointerEvents: "none" }} />

          {/* Heatmap overlay */}
          <svg width={w} height={h} style={{ position: "absolute", top: 0, left: 0, pointerEvents: "none", zIndex: 1 }}>
            <defs>
              {NEIGHBORHOODS.map(n => {
                const adj = n.pm25 * (1 - rf);
                const intensity = Math.min(1, (adj - WHO) / 16);
                const r = Math.round(60 + intensity * 200);
                const g = Math.round(185 - intensity * 155);
                const b = Math.round(80 - intensity * 50);
                return (
                  <radialGradient key={`g-${n.id}`} id={`grad-${n.id}`} cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stopColor={`rgb(${r},${g},${b})`} stopOpacity="0.45" />
                    <stop offset="70%" stopColor={`rgb(${r},${g},${b})`} stopOpacity="0.15" />
                    <stop offset="100%" stopColor={`rgb(${r},${g},${b})`} stopOpacity="0" />
                  </radialGradient>
                );
              })}
            </defs>
            {NEIGHBORHOODS.map(n => {
              const pos = latLngToPixel(n.lat, n.lng, center.lat, center.lng, zoom, w, h);
              const rad = Math.max(30, 60 * Math.pow(2, zoom - 12));
              const isH = hovered?.id === n.id;
              return (
                <g key={n.id}>
                  <circle cx={pos.x} cy={pos.y} r={rad} fill={`url(#grad-${n.id})`} />
                  <circle cx={pos.x} cy={pos.y} r={5} fill={isH ? "#111" : "#666"} opacity={isH ? 0.9 : 0.5} />
                  <text x={pos.x} y={pos.y - 9} textAnchor="middle" fill={isH ? "#111" : "#444"} fontSize={isH ? 12 : 11} fontWeight={isH ? 700 : 500} fontFamily="Inter,sans-serif" style={{ textShadow: "0 0 3px #fff, 0 0 6px #fff, 0 0 10px #fff" }}>
                    {n.name}
                  </text>
                </g>
              );
            })}
          </svg>

          {/* Lung cursor */}
          {isOnMap && !dragging.current && (() => {
            const d = hovered ? Math.min(1, Math.max(0, (hovered.pm25 * (1 - rf) - WHO) / 16)) : 0;
            return (
            <div style={{
              position: "absolute",
              left: mouseScreen.x, top: mouseScreen.y,
              transform: "translate(-50%, -50%)",
              width: 80 + d * 60, height: 80 + d * 60,
              pointerEvents: "none",
              zIndex: 2,
              filter: "none",
              transition: "filter 0.15s, width 0.15s, height 0.15s"
            }}>
              <LungSVG damage={d} breathPhase={breathPhase} />
            </div>
            );
          })()}

          {/* Legend bar */}
          <div style={{ position: "absolute", bottom: 12, right: 12, background: "rgba(255,255,255,0.92)", backdropFilter: "blur(8px)", borderRadius: 8, padding: "7px 12px", display: "flex", alignItems: "center", gap: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.1)", zIndex: 10 }}>
            <span style={{ fontSize: 10, color: "#888", fontWeight: 500 }}>Clean</span>
            <div style={{ width: 90, height: 7, borderRadius: 4, background: "linear-gradient(to right, #4ade80, #a3e635, #facc15, #f97316, #ef4444)" }} />
            <span style={{ fontSize: 10, color: "#888", fontWeight: 500 }}>Polluted</span>
          </div>

          {/* Zoom controls */}
          <div style={{ position: "absolute", top: 80, right: 12, display: "flex", flexDirection: "column", gap: 1, zIndex: 10 }}>
            <button onClick={() => setZoom(z => Math.min(16, z + 0.5))} style={{ width: 30, height: 30, background: "rgba(255,255,255,0.95)", border: "1px solid #ccc", borderRadius: "6px 6px 0 0", cursor: "pointer", fontSize: 16, color: "#333", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
            <button onClick={() => setZoom(z => Math.max(10, z - 0.5))} style={{ width: 30, height: 30, background: "rgba(255,255,255,0.95)", border: "1px solid #ccc", borderRadius: "0 0 6px 6px", cursor: "pointer", fontSize: 16, color: "#333", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
          </div>

          {/* Data sources */}
          <div style={{ position: "absolute", bottom: 12, left: 12, display: "flex", gap: 8, zIndex: 10 }}>
            <a href="#" onClick={e => e.preventDefault()} style={{ fontSize: 9, color: "#6366f1", textDecoration: "underline", background: "rgba(255,255,255,0.88)", padding: "4px 8px", borderRadius: 4, backdropFilter: "blur(6px)" }}>FHI Health Registry</a>
            <a href="#" onClick={e => e.preventDefault()} style={{ fontSize: 9, color: "#6366f1", textDecoration: "underline", background: "rgba(255,255,255,0.88)", padding: "4px 8px", borderRadius: 4, backdropFilter: "blur(6px)" }}>NILU Air Quality</a>
            <a href="#" onClick={e => e.preventDefault()} style={{ fontSize: 9, color: "#6366f1", textDecoration: "underline", background: "rgba(255,255,255,0.88)", padding: "4px 8px", borderRadius: 4, backdropFilter: "blur(6px)" }}>SSB Demographics</a>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("landing");
      const [mouseScreen, setMouseScreen] = useState({ x: 0, y: 0 });
      const [hovered, setHovered] = useState(null);
      const [breathPhase, setBreathPhase] = useState(0);
      const [isOnMap, setIsOnMap] = useState(false);
      const [selectedScenario, setSelectedScenario] = useState(null);
      const [detailScenario, setDetailScenario] = useState(null);
      const [center1, setCenter1] = useState({ lat: 59.915, lng: 10.76 });
      const [zoom1, setZoom1] = useState(12);
      const [center2, setCenter2] = useState({ lat: 59.915, lng: 10.76 });
      const [zoom2, setZoom2] = useState(12);
      const [dims, setDims] = useState({ w: 800, h: 600 });
      const containerRef = useRef(null);
      const containerRef2 = useRef(null);
      const outerRef = useRef(null);

      useEffect(() => {
        const st = Date.now();
        let af;
        const tick = () => { setBreathPhase((Date.now() - st) / 500); af = requestAnimationFrame(tick); };
        af = requestAnimationFrame(tick); return () => cancelAnimationFrame(af);
      }, []);

      useEffect(() => {
        const measure = () => {
          if (!outerRef.current) return;
          const r = outerRef.current.getBoundingClientRect();
          const sw = Math.floor(r.width * 0.30);
          setDims({ w: Math.floor(r.width) - sw, h: Math.floor(r.height) });
        };
        measure(); window.addEventListener("resize", measure);
        return () => window.removeEventListener("resize", measure);
      }, []);

      useEffect(() => {
        if (!outerRef.current) return;
        const r = outerRef.current.getBoundingClientRect();
        const sw = Math.floor(r.width * 0.30);
        setDims({ w: Math.floor(r.width) - sw, h: Math.floor(r.height) });
      }, [screen]);

      const curCenter = screen === "act" ? center2 : center1;
      const curZoom = screen === "act" ? zoom2 : zoom1;
      const ll = pixelToLatLng(mouseScreen.x, mouseScreen.y, curCenter.lat, curCenter.lng, curZoom, dims.w, dims.h);
      const rf = screen === "act" && selectedScenario ? selectedScenario.reduction : 0;
      const currentLY = interp(ll.lat, ll.lng, "lifeYearsLost");
      const currentHC = interp(ll.lat, ll.lng, "healthCost");
      const currentPM = interp(ll.lat, ll.lng, "pm25");
      const adjPM = currentPM * (1 - rf);
      const damage = getLungDamage(adjPM);
      const adjLY = currentLY * (1 - rf);
      const adjHC = currentHC * (1 - rf);
      const totalHosp = NEIGHBORHOODS.reduce((s, n) => s + n.hospVisits, 0);
      const totalHC = NEIGHBORHOODS.reduce((s, n) => s + n.healthCost, 0);
      const cardBg = "#f5f5f2";

      if (screen === "landing") {
        return (
          <div style={{
            height: "100vh", display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            background: "#fafaf8", fontFamily: "'Inter',-apple-system,sans-serif",
            color: "#111", overflow: "hidden",
          }}>
            <div style={{ textAlign: "center", maxWidth: 520, padding: "0 32px" }}>
              <div style={{ fontSize: 11, color: "#6366f1", textTransform: "uppercase", letterSpacing: "0.18em", fontWeight: 600, marginBottom: 20 }}>Oslo · Air Quality</div>
              <h1 style={{ fontSize: 56, fontWeight: 800, lineHeight: 1.1, letterSpacing: "-0.03em", color: "#111", margin: 0, marginBottom: 24 }}>
                What Oslo<br />breathes
              </h1>
              <p style={{ fontSize: 15, color: "#777", lineHeight: 1.7, marginBottom: 48, fontWeight: 400 }}>
                Move through the city. See the air.<br />
                Understand what it costs — in years and money.
              </p>
              <button
                onClick={() => setScreen("explore")}
                style={{
                  background: "#111", color: "#fff", border: "none",
                  borderRadius: 12, padding: "16px 40px",
                  fontSize: 15, fontWeight: 600, cursor: "pointer",
                  letterSpacing: "0.01em",
                }}
              >
                Explore the city →
              </button>
            </div>
          </div>
        );
      }

      if (screen === "explore") {
        return (
          <div ref={outerRef} style={{ height: "100vh", display: "flex", background: "#fafaf8", fontFamily: "'Inter',-apple-system,sans-serif", color: "#111", overflow: "hidden" }}>
            <div style={{ flex: 1, position: "relative" }}>
              <MapView mouseScreen={mouseScreen} setMouseScreen={setMouseScreen} isOnMap={isOnMap} setIsOnMap={setIsOnMap} hovered={hovered} setHovered={setHovered} damage={damage} breathPhase={breathPhase} rf={0} center={center1} setCenter={setCenter1} zoom={zoom1} setZoom={setZoom1} containerRef={containerRef} w={dims.w} h={dims.h} />
              <div style={{ position: "absolute", top: 16, left: 16, maxWidth: 290, pointerEvents: "none", background: "rgba(255,255,255,0.92)", backdropFilter: "blur(12px)", borderRadius: 10, padding: "14px 18px", boxShadow: "0 1px 6px rgba(0,0,0,0.08)", zIndex: 10 }}>
                <div style={{ fontSize: 9, color: "#6366f1", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4, fontWeight: 600 }}>Oslo today</div>
                <div style={{ fontSize: 16, fontWeight: 600, lineHeight: 1.3, color: "#222" }}>Move the lungs to see what you are breathing</div>
                <div style={{ fontSize: 11, color: "#999", marginTop: 3 }}>If you do nothing, this is what stays.</div>
              </div>
            </div>
            <div style={{ width: "30%", minWidth: 250, borderLeft: "1px solid #e8e8e4", background: "#fff", display: "flex", flexDirection: "column", overflowY: "auto" }}>

              {/* Total cost — prominent at top */}
              <div style={{ padding: 16, borderBottom: "1px solid #eee", background: "#111" }}>
                <div style={{ fontSize: 9, color: "#aaa", textTransform: "uppercase", letterSpacing: "0.13em", fontWeight: 600, marginBottom: 2 }}>Oslo — cost of doing nothing</div>
                <div style={{ fontSize: 10, color: "#555", marginBottom: 10 }}>These numbers repeat every single year</div>
                <div style={{ display: "flex", gap: 20, alignItems: "flex-end", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontSize: 36, fontWeight: 800, color: "#ef4444", fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{totalHosp.toLocaleString()}</div>
                    <div style={{ fontSize: 10, color: "#888", marginTop: 3 }}>hospital visits this year</div>
                    <div style={{ fontSize: 10, color: "#555", marginTop: 1 }}>≈ {Math.round(totalHosp / 365)} per day, air-related</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 36, fontWeight: 800, color: "#f97316", fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{totalHC}</div>
                    <div style={{ fontSize: 10, color: "#888", marginTop: 3 }}>MNOK spent this year</div>
                    <div style={{ fontSize: 10, color: "#555", marginTop: 1 }}>= {(totalHC * 10).toLocaleString()} MNOK over 10 years</div>
                  </div>
                </div>
              </div>

              {/* Hover details */}
              <div style={{ padding: "12px 16px 0" }}>
                <div style={{ fontSize: 9, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3, fontWeight: 500 }}>{hovered ? hovered.name : "Hover a neighbourhood"}</div>
                {hovered && <div style={{ fontSize: 11, color: "#888", marginBottom: 10 }}>{hovered.description}</div>}
              </div>
              <div style={{ padding: "0 16px", display: "flex", flexDirection: "column", gap: 6 }}>
                <div style={{ background: cardBg, borderRadius: 10, padding: 14 }}>
                  <div style={{ fontSize: 9, color: "#999", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.08em" }}>Life expectancy — permanent loss</div>
                  <div style={{ fontSize: 32, fontWeight: 700, marginTop: 4, color: currentLY > 1 ? "#dc2626" : (currentLY > 0.5 ? "#d97706" : "#16a34a"), fontVariantNumeric: "tabular-nums" }}>
                    −{currentLY.toFixed(1)} <span style={{ fontSize: 12, color: "#999", fontWeight: 400 }}>years</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#666", marginTop: 3 }}>= {Math.round(currentLY * 12)} months cut from your life</div>
                  <div style={{ fontSize: 10, color: "#aaa", marginTop: 2 }}>Compared to living in clean WHO-standard air</div>
                </div>
                <div style={{ background: cardBg, borderRadius: 10, padding: 14 }}>
                  <div style={{ fontSize: 9, color: "#999", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.08em" }}>Health cost — this area, per year</div>
                  <div style={{ fontSize: 32, fontWeight: 700, marginTop: 4, color: "#d97706", fontVariantNumeric: "tabular-nums" }}>
                    {currentHC.toFixed(0)} <span style={{ fontSize: 12, color: "#999", fontWeight: 400 }}>MNOK / year</span>
                  </div>
                  {hovered && <div style={{ fontSize: 11, color: "#666", marginTop: 3 }}>= {Math.round(hovered.healthCost * 1_000_000 / hovered.pop).toLocaleString()} kr per resident per year</div>}
                  <div style={{ fontSize: 10, color: "#aaa", marginTop: 2 }}>Hospitals, treatment, lost workdays</div>
                </div>
                {hovered && (
                  <div style={{ background: cardBg, borderRadius: 10, padding: 14 }}>
                    <div style={{ fontSize: 9, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8, fontWeight: 500 }}>Who breathes this air in {hovered.name}</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                      <div><div style={{ fontSize: 18, fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{(hovered.pop / 1000).toFixed(0)}k</div><div style={{ fontSize: 9, color: "#999" }}>total residents</div></div>
                      <div><div style={{ fontSize: 18, fontWeight: 600, color: "#d97706", fontVariantNumeric: "tabular-nums" }}>{(hovered.children / 1000).toFixed(1)}k</div><div style={{ fontSize: 9, color: "#999" }}>children — most vulnerable</div></div>
                      <div>
                        <div style={{ fontSize: 18, fontWeight: 600, color: "#dc2626", fontVariantNumeric: "tabular-nums" }}>{hovered.hospVisits}</div>
                        <div style={{ fontSize: 9, color: "#999" }}>hospital visits / year</div>
                        <div style={{ fontSize: 9, color: "#dc2626" }}>1 in {Math.round(hovered.pop / hovered.hospVisits)} residents</div>
                      </div>
                      <div><div style={{ fontSize: 18, fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{(hovered.elderly / 1000).toFixed(1)}k</div><div style={{ fontSize: 9, color: "#999" }}>elderly (65+) at risk</div></div>
                    </div>
                  </div>
                )}
              </div>
              <div style={{ marginTop: "auto", padding: 16 }}>
                <button
                  onClick={() => { setScreen("act"); setSelectedScenario(SCENARIOS[1]); }}
                  onMouseEnter={e => e.currentTarget.style.transform = "translateY(-2px)"}
                  onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
                  style={{
                    width: "100%", border: "none", borderRadius: 12, cursor: "pointer",
                    padding: "18px 16px", textAlign: "left",
                    background: "linear-gradient(135deg, #16a34a 0%, #15803d 100%)",
                    boxShadow: "0 4px 16px rgba(22,163,74,0.35)",
                    transition: "transform 0.15s, box-shadow 0.15s",
                  }}
                >
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.7)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Ready to change this?</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 17, fontWeight: 700, color: "#fff" }}>What if you act now?</div>
                    <div style={{ fontSize: 22, color: "#fff" }}>→</div>
                  </div>
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (screen === "act") {
        const sc = selectedScenario || SCENARIOS[1];
        return (
          <>
          <div ref={outerRef} style={{ height: "100vh", display: "flex", background: "#fafaf8", fontFamily: "'Inter',-apple-system,sans-serif", color: "#111", overflow: "hidden" }}>
            <div style={{ flex: 1, position: "relative" }}>
              <MapView mouseScreen={mouseScreen} setMouseScreen={setMouseScreen} isOnMap={isOnMap} setIsOnMap={setIsOnMap} hovered={hovered} setHovered={setHovered} damage={damage} breathPhase={breathPhase} rf={sc.reduction} center={center2} setCenter={setCenter2} zoom={zoom2} setZoom={setZoom2} containerRef={containerRef2} w={dims.w} h={dims.h} />
              <div style={{ position: "absolute", top: 16, left: 16, maxWidth: 290, pointerEvents: "none", background: "rgba(255,255,255,0.92)", backdropFilter: "blur(12px)", borderRadius: 10, padding: "14px 18px", boxShadow: "0 1px 6px rgba(0,0,0,0.08)", zIndex: 10 }}>
                <div style={{ fontSize: 9, color: "#16a34a", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4, fontWeight: 600 }}>What changes</div>
                <div style={{ fontSize: 16, fontWeight: 600, lineHeight: 1.3, color: "#222" }}>{sc.name}</div>
                <div style={{ fontSize: 11, color: "#999", marginTop: 3 }}>Move the lungs again — see the difference.</div>
              </div>
              <button onClick={() => setScreen("explore")} style={{
                position: "absolute", top: 16, right: 50, background: "rgba(255,255,255,0.92)", border: "1px solid #ddd",
                color: "#555", borderRadius: 8, padding: "7px 14px", fontSize: 11, cursor: "pointer", zIndex: 10
              }}>← Back to current state</button>
            </div>
            <div style={{ width: "30%", minWidth: 250, borderLeft: "1px solid #e8e8e4", background: "#fff", display: "flex", flexDirection: "column", overflowY: "auto" }}>

              {/* Impact header — prominent at top when hovering */}
              <div style={{ padding: 16, borderBottom: "1px solid #eee", background: "#111", minHeight: 90 }}>
                {hovered ? (
                  <>
                    <div style={{ fontSize: 9, color: "#aaa", textTransform: "uppercase", letterSpacing: "0.13em", fontWeight: 600, marginBottom: 2 }}>{hovered.name} — after this action</div>
                    <div style={{ fontSize: 10, color: "#555", marginBottom: 10 }}>Compared to doing nothing today</div>
                    <div style={{ display: "flex", gap: 20, alignItems: "flex-end" }}>
                      <div>
                        <div style={{ fontSize: 36, fontWeight: 800, color: adjLY > 1 ? "#ef4444" : (adjLY > 0.5 ? "#f97316" : "#4ade80"), fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>−{adjLY.toFixed(1)}</div>
                        <div style={{ fontSize: 10, color: "#888", marginTop: 3 }}>years lost per person</div>
                        <div style={{ fontSize: 10, color: "#4ade80", marginTop: 1 }}>+{Math.round((currentLY - adjLY) * 12)} months saved vs now</div>
                      </div>
                      <div>
                        <div style={{ fontSize: 36, fontWeight: 800, color: "#f97316", fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{adjHC.toFixed(0)}</div>
                        <div style={{ fontSize: 10, color: "#888", marginTop: 3 }}>MNOK / year remaining</div>
                        <div style={{ fontSize: 10, color: "#4ade80", marginTop: 1 }}>{(currentHC - adjHC).toFixed(0)} MNOK saved per year</div>
                      </div>
                    </div>
                  </>
                ) : (
                  <div style={{ display: "flex", alignItems: "center", height: 80 }}>
                    <div style={{ fontSize: 13, color: "#555" }}>Hover a neighbourhood to see its impact</div>
                  </div>
                )}
              </div>

              <div style={{ padding: 16 }}>
                <div style={{ fontSize: 9, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3, fontWeight: 500 }}>Choose a path forward</div>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: "#222" }}>Select a scenario to see its impact</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {SCENARIOS.map(s => {
                    const isSel = sc.id === s.id;
                    const bc = isSel ? (s.tag === "recommended" ? "#16a34a" : (s.tag === "most_effective" ? "#6366f1" : (s.tag === "most_efficient" ? "#d97706" : (s.tag === "baseline" ? "#9ca3af" : "#111")))) : "#e5e5e0";
                    return (
                      <button key={s.id} onClick={() => setSelectedScenario(s)} style={{
                        background: isSel ? "#f7f7f5" : "#fff", border: `2px solid ${bc}`,
                        borderRadius: 10, padding: "12px 14px", cursor: "pointer",
                        textAlign: "left", color: "#111", transition: "all 0.2s", position: "relative"
                      }}>
                        {s.tag && <span style={{
                          position: "absolute", top: -8, right: 10,
                          background: s.tag === "recommended" ? "#16a34a" : (s.tag === "most_effective" ? "#6366f1" : (s.tag === "most_efficient" ? "#d97706" : "#9ca3af")),
                          color: "#fff", fontSize: 8, fontWeight: 700, padding: "2px 6px", borderRadius: 3, textTransform: "uppercase"
                        }}>{s.tagLabel}</span>}
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, flex: 1, paddingRight: 6 }}>{s.name}</div>
                          <button
                            onClick={e => { e.stopPropagation(); setDetailScenario(s); }}
                            style={{ background: "#f0f0ec", border: "none", borderRadius: 20, width: 20, height: 20, fontSize: 11, cursor: "pointer", color: "#666", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}
                            title="View research details"
                          >i</button>
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
                          <div><div style={{ fontSize: 16, fontWeight: 700, color: "#16a34a" }}>{s.savedLives}</div><div style={{ fontSize: 9, color: "#999" }}>lives saved every year</div></div>
                          <div><div style={{ fontSize: 16, fontWeight: 700, color: "#16a34a" }}>{s.savedCost} NOK</div><div style={{ fontSize: 9, color: "#999" }}>healthcare saved / year</div></div>
                          <div><div style={{ fontSize: 13, fontWeight: 600, color: "#666" }}>{s.cost} NOK</div><div style={{ fontSize: 9, color: "#999" }}>one-time investment</div></div>
                          <div><div style={{ fontSize: 13, fontWeight: 600, color: "#666" }}>{s.timeline}</div><div style={{ fontSize: 9, color: "#999" }}>until full effect</div></div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
              <div style={{ marginTop: "auto", padding: "0 16px 12px" }}>
                <div style={{ fontSize: 9, color: "#bbb", lineHeight: 1.5, paddingTop: 10, borderTop: "1px solid #eee" }}>
                  Prototype · illustrative data · Real deployment uses live monitoring, FHI registries, SSB demographics.
                </div>
              </div>
            </div>
          </div>
          {detailScenario && (() => {
            const s = detailScenario;
            const accentColor = s.tag === "recommended" ? "#16a34a" : s.tag === "most_effective" ? "#6366f1" : s.tag === "most_efficient" ? "#d97706" : "#111";
            return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}
            onClick={() => setDetailScenario(null)}>
            <div style={{ background: "#fff", borderRadius: 16, maxWidth: 620, width: "100%", maxHeight: "88vh", overflowY: "auto", boxShadow: "0 24px 80px rgba(0,0,0,0.3)" }}
              onClick={e => e.stopPropagation()}>

              {/* Header */}
              <div style={{ padding: "24px 28px 20px", borderBottom: "1px solid #eee", position: "sticky", top: 0, background: "#fff", zIndex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    {s.tag && <div style={{ fontSize: 9, color: accentColor, textTransform: "uppercase", letterSpacing: "0.13em", fontWeight: 700, marginBottom: 6 }}>{s.tagLabel}</div>}
                    <div style={{ fontSize: 20, fontWeight: 800, color: "#111", lineHeight: 1.2 }}>{s.name}</div>
                  </div>
                  <button onClick={() => setDetailScenario(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#999", padding: 4 }}>✕</button>
                </div>
                <div style={{ display: "flex", gap: 20, marginTop: 14 }}>
                  <div style={{ background: "#f5f5f2", borderRadius: 8, padding: "8px 14px" }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#16a34a" }}>{s.savedLives} lives</div>
                    <div style={{ fontSize: 9, color: "#999" }}>saved every year</div>
                  </div>
                  <div style={{ background: "#f5f5f2", borderRadius: 8, padding: "8px 14px" }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#d97706" }}>{s.savedCost} NOK</div>
                    <div style={{ fontSize: 9, color: "#999" }}>healthcare saved / year</div>
                  </div>
                  <div style={{ background: "#f5f5f2", borderRadius: 8, padding: "8px 14px" }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#666" }}>{s.cost} NOK</div>
                    <div style={{ fontSize: 9, color: "#999" }}>one-time investment</div>
                  </div>
                  <div style={{ background: "#f5f5f2", borderRadius: 8, padding: "8px 14px" }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#666" }}>{s.timeline}</div>
                    <div style={{ fontSize: 9, color: "#999" }}>until full effect</div>
                  </div>
                </div>
              </div>

              <div style={{ padding: "20px 28px", display: "flex", flexDirection: "column", gap: 20 }}>

                {/* Summary */}
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Overview</div>
                  <div style={{ fontSize: 13, color: "#444", lineHeight: 1.7 }}>{s.summary}</div>
                </div>

                {/* Mechanism */}
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Scientific mechanism</div>
                  <div style={{ fontSize: 13, color: "#444", lineHeight: 1.7 }}>{s.mechanism}</div>
                </div>

                {/* Confidence */}
                <div style={{ background: "#f9f9f7", borderRadius: 10, padding: 14, borderLeft: `3px solid ${s.confidence === "High" ? "#16a34a" : "#d97706"}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.1em" }}>Evidence confidence</div>
                    <span style={{ background: s.confidence === "High" ? "#16a34a" : "#d97706", color: "#fff", fontSize: 9, fontWeight: 700, padding: "2px 8px", borderRadius: 20, textTransform: "uppercase" }}>{s.confidence}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#555", lineHeight: 1.6 }}>{s.confidenceNote}</div>
                </div>

                {/* Two columns: populations + cobenefits */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Populations that benefit</div>
                    {s.populations.map((p, i) => (
                      <div key={i} style={{ display: "flex", gap: 8, marginBottom: 5, alignItems: "flex-start" }}>
                        <div style={{ color: "#16a34a", marginTop: 1, flexShrink: 0 }}>✓</div>
                        <div style={{ fontSize: 12, color: "#555", lineHeight: 1.5 }}>{p}</div>
                      </div>
                    ))}
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Co-benefits</div>
                    {s.cobenefits.map((c, i) => (
                      <div key={i} style={{ display: "flex", gap: 8, marginBottom: 5, alignItems: "flex-start" }}>
                        <div style={{ color: "#6366f1", marginTop: 1, flexShrink: 0 }}>+</div>
                        <div style={{ fontSize: 12, color: "#555", lineHeight: 1.5 }}>{c}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Risks */}
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Risks & uncertainties</div>
                  {s.risks.map((r, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: 5, alignItems: "flex-start" }}>
                      <div style={{ color: "#d97706", marginTop: 1, flexShrink: 0 }}>!</div>
                      <div style={{ fontSize: 12, color: "#555", lineHeight: 1.5 }}>{r}</div>
                    </div>
                  ))}
                </div>

                {/* Sources */}
                <div style={{ borderTop: "1px solid #eee", paddingTop: 16 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>Research sources</div>
                  {s.sources.map((src, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, marginBottom: 7, alignItems: "flex-start" }}>
                      <div style={{ fontSize: 10, color: "#aaa", flexShrink: 0, paddingTop: 1 }}>[{i + 1}]</div>
                      <div>
                        <div style={{ fontSize: 12, color: "#333", fontWeight: 500 }}>{src.label}</div>
                        <div style={{ fontSize: 10, color: "#aaa", fontFamily: "monospace" }}>{src.ref}</div>
                      </div>
                    </div>
                  ))}
                </div>

              </div>
            </div>
          </div>
            );
          })()}
          </>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
